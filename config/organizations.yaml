# Organization Name Mapping Configuration
# ========================================
#
# This file normalizes organization names from meeting titles and email domains.
#
# Format:
#   canonical_name:
#     keywords:
#       - variant1
#       - variant2
#     domain_pattern: optional regex pattern for email domains
#
# The canonical_name will be used as the display name in the application.
# Keywords are matched case-insensitively against extracted organization names.

organizations:
  Blackridge Investments:
    keywords:
      - blackridge
      - blackridgeinvest
      - blackridge investments
      - blackridge investments custom
    domain_pattern: "blackridge.*"

  TechCorp Solutions:
