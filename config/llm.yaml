# LLM Configuration for Insights Generation
# ==========================================
#
# This file contains configuration for LLM providers (OpenAI, Gemini)
# used to generate deep insights from meeting transcripts.
#
# Author: Aegis Transcript Intelligence Team
# Date: 2026-05-07

# LLM Provider Settings
# ---------------------
# Supported providers: "openai", "gemini"
provider: "gemini" # Default provider

# OpenAI Configuration
# --------------------
openai:
  model: "gpt-4o" # gpt-4o, gpt-4o-mini, gpt-4-turbo, gpt-3.5-turbo
  max_tokens: 2000
  temperature: 0.3 # Lower temperature for more consistent, factual responses
  api_key_env_var: "OPENAI_API_KEY" # Environment variable name for API key

  # Rate limiting
  max_retries: 3
  timeout_seconds: 60

# Google Gemini Configuration
# ----------------------------
gemini:
  model: "gemini-2.5-flash" # gemini-1.5-pro, gemini-1.5-flash, gemini-2.5-flash
  max_tokens: 8000 # Increased for batch analysis (10 sections + multiple meetings)
  temperature: 0.3
  api_key_env_var: "GEMINI_API_KEY" # Environment variable name for API key

  # Rate limiting
  max_retries: 3
  timeout_seconds: 60

# Privacy & Security Settings
# ----------------------------
privacy:
  # Fields allowed to be sent to LLM
  allowed_fields:
    - meeting_id
    - summary
    - sentiment_score
    - topics
    - date
    - overall_sentiment
    - key_moments

# Text Optimization Settings
# --------------------------
# Optimize summaries to reduce token usage
text_optimization:
  enabled: true # Enable text optimization to reduce tokens
  remove_filler_words: true
  compress_phrases: true

  # Common filler words to remove
  filler_words:
    - actually
    - basically
    - essentially
    - literally
    - obviously
    - seriously
    - totally
    - really
    - very
    - quite
    - rather
    - somewhat
    - just
    - simply
    - merely
    - absolutely
    - completely
    - definitely
    - certainly
    - perhaps
    - maybe
    - probably
    - approximately
    - roughly
    - around
    - kind of
    - sort of
    - a bit
    - a little
    - a lot
    - you know
    - I mean
    - like

  # Verbose phrases to compress (phrase: replacement)
  phrase_compressions:
    "in order to": "to"
    "due to the fact that": "because"
    "at this point in time": "now"
    "for the purpose of": "for"
    "in the event that": "if"
    "on a daily basis": "daily"
    "on a weekly basis": "weekly"
    "on a monthly basis": "monthly"
    "has the ability to": "can"
    "is able to": "can"
    "in spite of the fact that": "although"
    "with regard to": "regarding"
    "with reference to": "regarding"
    "in relation to": "regarding"
    "as a result of": "from"
    "for the reason that": "because"
    "in light of the fact that": "because"
    "taking into consideration": "considering"
    "make a decision": "decide"
    "come to a decision": "decide"
    "reach a decision": "decide"
    "give consideration to": "consider"
    "take into account": "consider"
    "prior to": "before"
    "subsequent to": "after"
    "in the near future": "soon"
    "at the present time": "now"
    "in the process of": "processing"
    "provide assistance to": "help"
    "make an attempt": "try"
    "conduct an investigation": "investigate"

  # PII patterns to redact (emails, names, phone numbers, etc.)
  redact_patterns:
    - emails: true
    - phone_numbers: true
    - ip_addresses: true
    - organization_names: true # Replace with generic tokens
    - person_names: true # Replace with role-based tokens (Agent, Customer)

# Prompt Configuration
# --------------------
prompt:
  # System prompt for context
  system_prompt: |
    You are a customer service quality analyst with expertise in analyzing support interactions.
    You provide objective, actionable insights based on conversation data.
    Always return valid JSON format. Be concise but thorough.

  # User prompt template (variables: {meeting_id}, {date}, {summary}, {sentiment_score}, {topics})
  user_prompt_template: |
    Analyze the following customer support call summary data.

    Meeting ID: {meeting_id}
    Call Date: {date}
    Summary: {summary}
    Topics: {topics}
    Sentiment Score: {sentiment_score}/5.0

    Return the output in JSON format with the following sections:

    1. overall_summary
       - concise summary of the conversation

    2. what_went_well
       - things the agent handled effectively

    3. what_did_not_go_well
       - problems, frustrations, or failures

    4. key_customer_issues
       - main customer complaints or concerns

  # Batch analysis prompt template (variables: {meetings_data}, {period_start}, {period_end}, {total_meetings}, {min_sentiment}, {max_sentiment}, {avg_sentiment})
  batch_prompt_template: |
    CRITICAL CONTEXT: The following meetings have been flagged as HIGH-RISK due to low sentiment scores (<2.5 out of 5.0).
    These represent the most problematic customer interactions requiring immediate attention.

    SENTIMENT STATISTICS:
    - Worst Score: {min_sentiment}/5.0
    - Best Score: {max_sentiment}/5.0
    - Average Score: {avg_sentiment}/5.0
    - Total Meetings: {total_meetings}

    Time Period: {period_start} to {period_end}

    Meeting Data:
    {meetings_data}

    Analyze this batch of high-risk customer support calls and provide a JSON response with exactly this structure:

    {{
      "period_overview": "A 2-3 sentence summary explaining why these meetings have low sentiment and what major issues or outages are affecting customers.",
      "common_themes": {{
        "recurring_issues": ["issue 1", "issue 2", "issue 3"],
        "customer_pain_points": ["pain point 1", "pain point 2"],
        "frequently_mentioned_topics": ["topic 1", "topic 2"]
      }},
      "product_issues": {{
        "critical_technical_problems": ["problem 1", "problem 2"],
        "feature_complaints": ["complaint 1", "complaint 2"],
        "adoption_blockers": ["blocker 1", "blocker 2"]
      }},
      "actionable_recommendations": {{
        "immediate_actions": ["action 1", "action 2"],
        "process_improvements": ["improvement 1", "improvement 2"],
        "follow_up_priorities": ["priority 1", "priority 2"]
      }},
      "executive_summary": ["Critical insight 1 as a complete sentence.", "Critical insight 2 covering business impact.", "Critical insight 3 with recommended actions."]
    }}

    IMPORTANT: Return ONLY valid JSON. Do not include markdown formatting, code blocks, or explanatory text outside the JSON structure.

# Caching Configuration
# ---------------------
cache:
  # Enable caching of LLM responses to avoid redundant API calls
  enabled: true

  # Cache duration in seconds (24 hours)
  ttl_seconds: 86400

  # Cache storage location
  cache_dir: ".cache/llm_insights"

# Response Validation
# -------------------
validation:
  # Require JSON response format
  require_json: true

  # Required fields in response (single meeting analysis)
  required_fields:
    - overall_summary
    - what_went_well
    - what_did_not_go_well
    - key_customer_issues

  # Required fields for batch analysis
  batch_required_fields:
    - period_overview
    - common_themes
    - product_issues
    - actionable_recommendations
    - executive_summary

  # Maximum retry attempts if response validation fails
  max_validation_retries: 2
